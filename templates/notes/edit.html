{% extends "base.html" %}
{% block title %}Edit: {{ note.title }} - {{ app_name }}{% endblock %}
{% block content %}
<div class="page" style="max-width:640px;">
  <h1>Edit Note</h1>
  <div class="card">
    <form method="POST">
      <div class="field"><div class="label">Title</div><input name="title" value="{{ note.title }}" required autofocus /></div>
      <div class="field"><div class="label">Content</div><textarea name="body" style="min-height:200px;">{{ note.body or '' }}</textarea></div>
      <div class="flex gap-8">
        <button class="btn btn-primary">Save Changes</button>
        <a href="/notes/{{ note.id }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
