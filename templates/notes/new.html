{% extends "base.html" %}
{% block title %}New Note - {{ app_name }}{% endblock %}
{% block content %}
<div class="page" style="max-width:640px;">
  <h1>New Note</h1>
  <div class="sub">This is an example CRUD feature — delete it when building your app.</div>
  <div class="card">
    <form method="POST">
      <div class="field"><div class="label">Title</div><input name="title" required autofocus placeholder="Note title" /></div>
      <div class="field"><div class="label">Content</div><textarea name="body" placeholder="Write your note... (Markdown supported)" style="min-height:200px;"></textarea></div>
      <div class="flex gap-8">
        <button class="btn btn-primary">Save Note</button>
        <a href="/dashboard" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
